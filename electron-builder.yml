appId: ai.shamcleren.codepal
productName: CodePal
directories:
  output: release
files:
  - out/**/*
  - package.json
asar: true
npmRebuild: false
mac:
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
